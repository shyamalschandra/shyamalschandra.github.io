<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ page.title | default: site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
  </head>
  <body class="theme-dark">
    <div class="background-gradient"></div>
    <header class="navbar glassy blur">
      <div class="nav-inner">
        <div class="nav-brand">
          <span class="nav-logo-dot"></span>
          <span class="nav-title">{{ site.title }}</span>
        </div>
        <nav class="nav-links">
          <a href="#hero" data-scroll>About</a>
          <a href="#skills" data-scroll>Skills</a>
          <a href="#projects" data-scroll>Projects</a>
          <a href="#certificates" data-scroll>Certificates</a>
          <a href="#experience" data-scroll>Experience</a>
          <a href="#contact" data-scroll>Contact</a>
        </nav>
        <button class="theme-toggle" aria-label="Toggle dark mode">
          <span class="theme-toggle-knob"></span>
        </button>
      </div>
    </header>

    <main>
      {{ content }}
    </main>

    <footer class="footer">
      <p>© {{ "now" | date: "%Y" }} {{ site.title }} · Built with Jekyll & GitHub Pages</p>
    </footer>

    <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
  </body>
</html>
